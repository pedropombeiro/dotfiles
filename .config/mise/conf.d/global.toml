[tools]
# ── Shell UX ──────────────────────────────────────────────────────────
# Shell history with sync and search
atuin = "latest"
# Interactive disk usage analyzer
dua = "latest"
# Fast alternative to find
"aqua:sharkdp/fd" = "latest"
# Tmux session manager
"aqua:joshmedeski/sesh" = "latest"

# ── Developer workflow ────────────────────────────────────────────────
# Git hook manager
pre-commit = "latest"
# Utilities for working with patches (filterdiff, etc.)
"github:twaugh/patchutils" = "latest"

# ── AI tooling ────────────────────────────────────────────────────────
# Lazy-loading MCP server proxy for AI tools
"npm:lazy-mcp" = "latest"
