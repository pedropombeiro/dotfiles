#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[[session]]
name = "Neovim config"
path = "~/.config/nvim"
startup_command = "nvim -c ':lua Snacks.picker.files()'"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "tmux config"
path = "~/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always ~/.config/tmux/tmux.conf"

[[session]]
name = "sesh config"
path = "~/.config/sesh"
startup_command = "nvim -c ':lua Snacks.picker.files()'"
preview_command = "eza --all --git --icons --color=always --oneline {}"

[[session]]
name = "mise config"
path = "~/.config/mise"
startup_command = "nvim -c ':lua Snacks.picker.files()'"
preview_command = "eza --all --git --icons --color=always {}"

[[session]]
name = "OpenCode config"
path = "~/.config/opencode"
startup_command = "nvim"
preview_command = "eza --all --git --icons --color=always --oneline {}"
