#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

[[session]]
name = "Home Assistant config"
path = "/share/Container/config/home-assistant/config"
startup_command = "nvim"
preview_command = "eza --all --git --icons --color=always --oneline {}"

[[wildcard]]
pattern = "/share/Container/compose/*"
startup_command = "nvim docker-compose.yml"
preview_command = "bat --color=always {}/docker-compose.yml"
