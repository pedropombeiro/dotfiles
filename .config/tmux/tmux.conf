# Turn on mouse support
set -g mouse on

# Update terminal/tab titles
set -g set-titles on
set -g set-titles-string "#S - #W"

set-option -g focus-events on
set-option -g allow-passthrough all # Allow not only the active tmux panel to passthrough (on), but all panels to passthrough, so that progress shows through from inactive panels

# Enable VI mode
setw -g mode-keys vi

# Enable clipboard integration via OSC 52 for remote sessions
set -g set-clipboard on
set -as terminal-features ',tmux*:clipboard'

# Pass PageUp/PageDown through to applications (don't enter copy mode)
unbind-key -T root PPage
unbind-key -T root NPage

# Don't copy on mouse drag release — just keep the selection; press Enter to copy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection

# Use the mouse drag to re-order windows
bind-key -n MouseDrag1Status swap-window -t=

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

# Source local overrides (QNAP terminal fixes, etc.)
if-shell '[ -f ~/.config/tmux/tmux.platform.conf ]' 'source-file ~/.config/tmux/tmux.platform.conf'

set -g @tmux-gruvbox 'dark256' # or 'light256'
set -g @tmux-gruvbox-statusbar-alpha 'true'
set -g @tmux-gruvbox-right-status-z '#{tmux_mode_indicator}'

# TPM plugin manager path (required by TPM scripts)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins/"

# List of plugins
set -g @plugin tmux-plugins/tpm
set -g @plugin tmux-plugins/tmux-sensible
set -g @plugin tmux-plugins/tmux-pain-control
set -g @plugin egel/tmux-gruvbox
set -g @plugin 'alexwforsythe/tmux-which-key'

set -g @plugin 'MunifTanjim/tmux-mode-indicator'
## Mode indicator prompts
set -g @mode_indicator_prefix_prompt ' WAIT '
set -g @mode_indicator_copy_prompt ' COPY '
set -g @mode_indicator_sync_prompt ' SYNC '
set -g @mode_indicator_empty_prompt ' TMUX '
set -g @mode_indicator_prefix_mode_style 'bg=colour214,fg=colour237'
set -g @mode_indicator_copy_mode_style 'bg=colour109,fg=colour237'
set -g @mode_indicator_sync_mode_style 'bg=colour208,fg=colour237'
set -g @mode_indicator_empty_mode_style 'bg=colour248,fg=colour237'

set -g @plugin 'christoomey/vim-tmux-navigator' # Pairs with https://github.com/christoomey/vim-tmux-navigator
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_mapping_prev "M-\\"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Unbind prefix + hjkl pane navigation (redundant with M-hjkl via vim-tmux-navigator)
unbind h
unbind j
unbind k
unbind l

# prefix + l: Launch lazygit (uses yadm when in $HOME)
bind l run-shell 'if [ "#{pane_current_path}" = "$HOME" ]; then tmux split-window -Z -c "#{pane_current_path}" "zsh -ilc \"y lazygit --use-config-dir ~/.config/lazygit\""; else tmux split-window -Z -c "#{pane_current_path}" "zsh -ilc \"lazygit --use-config-dir ~/.config/lazygit\""; fi'

# prefix + f: Launch fm (zoomed)
bind f run-shell 'tmux split-window -Z -c "#{pane_current_path}" "zsh -ilc \"fm\""'

# prefix + o: Launch opencode (new session)
# prefix + O: Launch opencode (resume session)
bind o split-window -h -p 40 -c "#{pane_current_path}" "zsh -ilc 'oc'"
bind O split-window -h -p 40 -c "#{pane_current_path}" "zsh -ilc 'oc -c'"

# Use pane_current_path for new windows and panes
# These bindings must come AFTER TPM to override tmux-pain-control
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind '\' split-window -fh -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind '_' split-window -fv -c "#{pane_current_path}"

# Re-source platform overrides after TPM so that gruvbox doesn't clobber
# host-specific status-left customizations (e.g. NAS red session indicator)
if-shell '[ -f ~/.config/tmux/tmux.platform.conf ]' 'source-file ~/.config/tmux/tmux.platform.conf'
