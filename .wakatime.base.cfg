[settings]
api_url = https://wakapi.pombei.ro/api
hide_project_folder = false

[git]
project_from_git_remote = true

[projectmap]
^/Users/pedro(pombeiro)?/\.config/.* = dotfiles
^/Users/pedro(pombeiro)?/\.shellrc/.* = dotfiles
^/Users/pedro(pombeiro)?/\.agents/.* = dotfiles
^/Users/pedro(pombeiro)?/\.claude/.* = dotfiles
^/Users/pedro(pombeiro)?/\..* = dotfiles
^/share/(CACHEDEV1_DATA/)?homes/admin/\.config/.* = dotfiles
^/share/(CACHEDEV1_DATA/)?homes/admin/\.shellrc/.* = dotfiles
^/share/(CACHEDEV1_DATA/)?homes/admin/\.agents/.* = dotfiles
^/share/(CACHEDEV1_DATA/)?homes/admin/\.claude/.* = dotfiles
^/share/(CACHEDEV1_DATA/)?homes/admin/\..* = dotfiles
^.*/gitlab-development-kit/gitlab/.* = gitlab-org/gitlab

[wakadash]
# GitHub repo for historical data (format: owner/repo)
# Set up your archive with wakasync: https://github.com/b00y0h/wakasync
# history_repo = your-username/wakatime-data

# Theme: dracula, nord, gruvbox, monokai, solarized, tokyonight
theme = gruvbox
